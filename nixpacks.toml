[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npx prisma generate", "npx next build", "npx tsc prisma/seed.ts --outDir dist/seed --module commonjs --moduleResolution node --esModuleInterop --skipLibCheck --resolveJsonModule || true"]

[start]
cmd = "npx prisma db push --accept-data-loss && (node dist/seed/seed.js 2>/dev/null || npx tsx prisma/seed.ts) && npm start"
